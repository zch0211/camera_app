# Local development overrides — loaded automatically when spring.profiles.active=local
spring:
  datasource:
    # Matches docker-compose mysql service
    url: jdbc:mysql://localhost:3306/camera_app?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: camera
    password: camera123

  jpa:
    show-sql: true

logging:
  level:
    com.camera.app: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
    org.neo4j.driver: WARN

# 知识图谱 — Neo4j 只读接入
kg:
  camera:
    uri: neo4j://127.0.0.1:7687
    database: neo4j
    username: neo4j
    password: 12345678
